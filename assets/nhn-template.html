<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHN 디자인 양식 · 템플릿</title>
<!--
  ┌────────────────────────────────────────────────────────────┐
  │  NHN 디자인 양식 (모노톤 + 강조색)                              │
  │  · 본문/헤더 검정 #0f172a, 보조 #475569                        │
  │  · 강조/증가 파랑 rgb(6,94,247) / 감소 빨강 #dc2626            │
  │  · 섹션 헤더는 검은 바탕 흰 볼드                                 │
  │  · 단어형/구로 끝나면 마침표(.) 빼기 · 어미 ~습니다 지양         │
  │  필요한 블록을 복사해서 쓰세요. 아래 컴포넌트 예시 포함.          │
  └────────────────────────────────────────────────────────────┘
-->
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --ink:#0f172a; --sub:#475569; --mute:#94a3b8;
    --line:#e2e8f0; --bg:#f8fafc; --card:#ffffff;
    --blue:#065ef7;   /* 증가/강조 */
    --red:#dc2626;    /* 감소 */
    --link:#2563eb;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); line-height:1.65; letter-spacing:-.01em;
    font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  a{color:var(--link); text-decoration:none}
  .wrap{max-width:1040px; margin:0 auto; padding:0 18px}

  /* 페이지 헤더 */
  header.hero{background:var(--ink); color:#fff; padding:36px 0 28px}
  .hero .eyebrow{font-size:13px; letter-spacing:.18em; color:#cbd5e1; font-weight:600; text-transform:uppercase}
  .hero h1{margin:8px 0 4px; font-size:32px; font-weight:800}
  .hero .sub{color:#cbd5e1; font-size:15px}

  /* 검은 섹션 헤더 (NHN 필수 규칙) */
  .sec-head{background:var(--ink); color:#fff; font-weight:800; font-size:18px; padding:11px 16px; border-radius:10px; margin:28px 0 14px}

  /* 카드 */
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:20px 22px; margin-bottom:16px}
  .card h3{margin:0 0 8px; font-size:17px; font-weight:800}

  /* 증감 색상 (퍼센트 먼저, YoY/QoQ 뒤) */
  .up{color:var(--blue); font-weight:800}     /* 예: +42% YoY */
  .down{color:var(--red); font-weight:800}    /* 예: -15% QoQ */

  /* 리스트 (번호 매김 시 ol 사용) */
  .list{list-style:none; padding:0; margin:0}
  .list li{position:relative; padding:7px 0 7px 24px; border-bottom:1px dashed #eef2f7; font-size:14.5px}
  .list li:last-child{border-bottom:0}
  .list li::before{content:""; position:absolute; left:5px; top:14px; width:7px; height:7px; border-radius:50%; background:var(--ink)}
  .list li .nm{font-weight:700} .list li .ds{color:var(--sub)}

  /* 강조 박스 */
  .note{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 15px; margin:10px 0}
  .note .lab{font-size:11px; font-weight:800; letter-spacing:.04em; color:var(--mute); text-transform:uppercase}
  .note p{margin:4px 0 0; font-size:13.5px; color:var(--sub)}
  .tip{font-size:13px; color:var(--sub); background:#fffbeb; border:1px solid #fde68a; border-radius:12px; padding:11px 14px; margin:10px 0}
  .tip b{color:#b45309}
  /* 종료/주의 박스 (빨간 좌측 강조선) */
  .end{border-left:4px solid var(--red); background:#fef2f2; border:1px solid #fecaca; border-radius:12px; padding:12px 15px; margin:10px 0}
  .tag-end{display:inline-block; font-size:11px; font-weight:800; color:#fff; background:var(--red); padding:1px 8px; border-radius:6px}

  /* 표 */
  table{width:100%; border-collapse:collapse; font-size:13.5px; margin:8px 0}
  th{background:var(--ink); color:#fff; font-weight:700; text-align:left; padding:9px 12px}
  td{border-bottom:1px solid var(--line); padding:9px 12px; color:var(--sub)}

  footer{padding:30px 0 50px; color:var(--mute); font-size:12px; text-align:center}
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow">NHN Document Template</div>
    <h1>문서 제목을 입력하세요</h1>
    <div class="sub">부제 · 날짜 · 한 줄 설명</div>
  </div>
</header>

<main class="wrap">

  <!-- 검은 섹션 헤더 + 카드 -->
  <div class="sec-head">1. 섹션 제목 (검은 헤더)</div>
  <div class="card">
    <h3>카드 제목</h3>
    <ul class="list">
      <li><span class="nm">항목명</span> <span class="ds">— 한 줄 설명 (단어형으로 끝나면 마침표 빼기)</span></li>
      <li><span class="nm">매출</span> <span class="ds">— 1,234억원 <span class="up">+42% YoY</span> / <span class="down">-15% QoQ</span></span></li>
    </ul>
    <div class="note"><div class="lab">참고</div><p>보조 설명 박스</p></div>
    <div class="tip"><b>TIP</b> 강조 팁 박스</div>
  </div>

  <!-- 표 예시 -->
  <div class="sec-head">2. 표</div>
  <div class="card">
    <table>
      <thead><tr><th>구분</th><th>값</th><th>증감</th></tr></thead>
      <tbody>
        <tr><td>항목 A</td><td>100</td><td><span class="up">+10% YoY</span></td></tr>
        <tr><td>항목 B</td><td>80</td><td><span class="down">-5% QoQ</span></td></tr>
      </tbody>
    </table>
  </div>

  <!-- 종료/주의 박스 -->
  <div class="sec-head">3. 종료 · 주의</div>
  <div class="card">
    <div class="end"><span class="tag-end">종료</span> 서비스 종료/주의 내용 (빨간 좌측 강조선)</div>
  </div>

</main>

<footer>NHN 디자인 양식 · 모노톤 + 강조색</footer>
</body>
</html>
